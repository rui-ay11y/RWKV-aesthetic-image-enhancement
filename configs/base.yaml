training:
  max_epochs: 25
  init_from_checkpoint: null
  resume_from_checkpoint: null
  batch_size: 8
  num_workers: 4
  learning_rate: 1.0e-4
  main_learning_rate: null   # [E1 MOD] Optional LR for RWKV + decoder groups
  encoder_learning_rate: null  # [E1 MOD] Optional LR for trainable encoder heads
  weight_decay: 1.0e-4
  scheduler: cosine         # cosine / step / plateau
  warmup_epochs: 5
  early_stopping:
    patience: 4
    monitor: "val/psnr"
    mode: "max"
  gradient_clip_val: 1
  require_gpu: true

evaluation:
  save_samples_every_n_epochs: 10
  num_visualization_samples: 8
  enable_lpips: true

logging:
  log_dir: "outputs/logs"
  results_dir: "results"
  console_level: "INFO"

checkpoint:
  save_top_k: 3
  monitor: "val/psnr"
  mode: "max"
  dirpath: "outputs/checkpoints"
